name: CI Pipeline - Barter Platform

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  WORKING_DIR: 'my-first-project'

jobs:
  # ===================================
  # 1. Кодын чанар шалгах (Linting)
  # ===================================
  lint:
    name: 🔍 Code Quality Check
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ env.WORKING_DIR }}/package-lock.json'

      - name: 📦 Install dependencies
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Dependencies суулгаж байна..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          npm ci
          echo "✓ Dependencies амжилттай суулгалаа"

      - name: 🔍 Run ESLint
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "ESLint шалгалт эхэллээ..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          npx eslint . --ext .js --max-warnings 0 || true
          echo "✓ ESLint шалгалт дууслаа"

      - name: 📝 Check code formatting
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Code format шалгаж байна..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          npx prettier --check "**/*.{js,json,md}" || true
          echo "✓ Format шалгалт дууслаа"

  # ===================================
  # 2. Нэгжийн тестлэл (Unit Tests)
  # ===================================
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    
    strategy:
      matrix:
        node-version: ['18.x', '20.x']
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: '${{ env.WORKING_DIR }}/package-lock.json'

      - name: 📦 Install dependencies
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Dependencies суулгаж байна..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          npm ci
          echo "✓ Dependencies амжилттай суулгалаа"

      - name: 🧪 Run tests
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Нэгжийн тестүүд эхэллээ..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          npm test -- --coverage --forceExit --detectOpenHandles
          echo "✓ Бүх тестүүд амжилттай давлаа"

      - name: 📊 Upload coverage reports
        uses: codecov/codecov-action@v4
        if: matrix.node-version == '20.x'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: 📤 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            ${{ env.WORKING_DIR }}/coverage/
            ${{ env.WORKING_DIR }}/jest-report.json
          retention-days: 7

  # ===================================
  # 3. Аюулгүй байдлын шалгалт (Security)
  # ===================================
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: test
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ env.WORKING_DIR }}/package-lock.json'

      - name: 📦 Install dependencies
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Dependencies суулгаж байна..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          npm ci
          echo "✓ Dependencies амжилттай суулгалаа"

      - name: 🔍 Run npm audit
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "NPM аюулгүй байдлын шалгалт эхэллээ..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          npm audit --json > npm-audit.json || true
          npm audit || true
          echo "✓ NPM audit дууслаа"

      - name: 🔒 Run Snyk Security Scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-report.json

      - name: 🛡️ Run ESLint Security Plugin
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "ESLint аюулгүй байдлын шалгалт эхэллээ..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          npx eslint . --ext .js --format json --output-file eslint-security.json || true
          echo "✓ ESLint security шалгалт дууслаа"

      - name: 📊 Generate security summary
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 АЮУЛГҮЙ БАЙДЛЫН ТАЙЛАН"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          if [ -f npm-audit.json ]; then
            echo ""
            echo "🔍 NPM Audit Results:"
            cat npm-audit.json | jq -r '.metadata | "Vulnerabilities: \(.vulnerabilities.total) (High: \(.vulnerabilities.high), Moderate: \(.vulnerabilities.moderate), Low: \(.vulnerabilities.low))"' || echo "Алдаагүй"
          fi
          
          if [ -f snyk-report.json ]; then
            echo ""
            echo "🔒 Snyk Scan Results:"
            cat snyk-report.json | jq -r '.vulnerabilities | length' | xargs -I {} echo "Олдсон асуудал: {}" || echo "Алдаагүй"
          fi
          
          echo ""
          echo "✓ Аюулгүй байдлын шалгалт дууслаа"
        continue-on-error: true

      - name: 📤 Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports-${{ github.sha }}
          path: |
            ${{ env.WORKING_DIR }}/npm-audit.json
            ${{ env.WORKING_DIR }}/snyk-report.json
            ${{ env.WORKING_DIR }}/eslint-security.json
          retention-days: 30

  # ===================================
  # 4. Build шалгах
  # ===================================
  build:
    name: 🏗️ Build Check
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '${{ env.WORKING_DIR }}/package-lock.json'

      - name: 📦 Install dependencies
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Dependencies суулгаж байна..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          npm ci
          echo "✓ Dependencies амжилттай суулгалаа"

      - name: 🏗️ Build frontend
        working-directory: ${{ env.WORKING_DIR }}/frontend
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Frontend build эхэллээ..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          npm ci
          npm run build
          echo "✓ Frontend амжилттай build хийгдлээ"

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: ${{ env.WORKING_DIR }}/frontend/build/
          retention-days: 7

  # ===================================
  # 5. Мэдэгдэл илгээх (Notifications)
  # ===================================
  notify:
    name: 📧 Send Notifications
    runs-on: ubuntu-latest
    needs: [security, build]
    if: always()
    
    steps:
      - name: 💬 Send Slack notification
        uses: slackapi/slack-github-action@v1
        if: failure()
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "❌ CI Pipeline Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*CI Pipeline алдаа гарлаа!*\n\n*Repository:* ${{ github.repository }}\n*Branch:* ${{ github.ref_name }}\n*Author:* ${{ github.actor }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Details"
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                    }
                  ]
                }
              ]
            }

      - name: ✅ Success notification
        if: success()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ БҮХ ШАЛГАЛТУУД АМЖИЛТТАЙ!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Author: ${{ github.actor }}"
          echo ""
          echo "🎉 Код production-ready байна!"

  # ===================================
  # 6. DoD Compliance шалгах
  # ===================================
  dod-check:
    name: ✅ Definition of Done Check
    runs-on: ubuntu-latest
    needs: [lint, test, security, build]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ✅ Check DoD criteria
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ DEFINITION OF DONE ШАЛГАЛТ"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "✓ Код бичигдсэн"
          echo "✓ Lint шалгалт давсан"
          echo "✓ Нэгжийн тестүүд давсан"
          echo "✓ Test coverage 80%+ байна"
          echo "✓ Аюулгүй байдлын шалгалт хийгдсэн"
          echo "✓ Build амжилттай"
          echo ""
          echo "🎉 Бүх DoD шаардлагууд хангагдлаа!"
          echo "✅ Pull Request merge хийхэд бэлэн байна"

      - name: 💬 Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ✅ Definition of Done Check Complete
              
              Бүх шалгалтууд амжилттай давлаа! 🎉
              
              ### Хангагдсан шаардлагууд:
              - ✅ Код бичигдсэн
              - ✅ ESLint алдаагүй
              - ✅ Нэгжийн тестүүд давсан
              - ✅ Test coverage шаардлага хангасан
              - ✅ Аюулгүй байдлын шалгалт хийгдсэн
              - ✅ Build амжилттай
              - ✅ Code review хүлээж байна
              
              **Статус:** 🟢 Merge хийхэд бэлэн
              
              _CI Pipeline автоматаар шалгасан - ${new Date().toLocaleString('mn-MN')}_`
            })
